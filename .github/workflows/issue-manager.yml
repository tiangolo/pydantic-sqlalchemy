name: "Issue Manager"

on:
  schedule:
  - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  issue-manager:
    runs-on: ubuntu-latest
    steps:
    - uses: tiangolo/issue-manager@75d60679db1ea348f6f6ea1d0e20de80a7c04645 # 0.7.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
